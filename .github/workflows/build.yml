name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: python build.py

      - name: Publish "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Automatically built from the latest commit on main.

            **Windows may show a "Windows protected your PC" / unknown publisher
            warning** — that's normal for a small unsigned indie tool, not a sign
            of malware. Click "More info" → "Run anyway".
          files: dist/BuckshotOverlay.exe
          prerelease: false
