name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build bsr_core (Rust search core)
        run: |
          pip install maturin
          maturin build --release --manifest-path bsr_core/Cargo.toml --out wheels
          pip install --no-index --find-links wheels bsr_core

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build exe
        run: python build.py

      - name: Publish "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Automatically built from the latest commit on main.

            **Windows will complain about an unsigned indie exe — that's
            expected, not malware.** Depending on where it stops you
            (Windows 10 and 11):

            1. **Simplest fix for most cases**: right-click the downloaded
               exe → **Properties** → tick **Unblock** at the bottom → OK.
            2. **Browser blocks the download** (Edge/Chrome: "isn't commonly
               downloaded") — open the downloads list, click the entry →
               **Keep** → **Keep anyway**.
            3. **"Windows protected your PC" (SmartScreen)** on launch —
               click **More info** → **Run anyway**.
            4. **Defender quarantines the file** — open **Windows Security →
               Virus & threat protection → Protection history**, find the
               blocked item and choose **Restore / Allow**. Or add the folder
               to exclusions: **Virus & threat protection → Manage settings →
               Exclusions → Add folder**.

            Don't want to trust a random exe? Fair — the source is open,
            build it yourself: see "Building it yourself" in the README.
          files: dist/BuckshotOverlay.exe
          prerelease: false
